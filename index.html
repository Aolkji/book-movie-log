<!Doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title> Tracker.io </title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet"/>

  </head>
  <body>

      <nav class="navbar navbar-expand-lg navbar-dark bg-dark  ">
          <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand me-4" href="#">
            <img src="search1.png" alt="" width="85" height="60" class="d-inline-block align-text-top">
            Trackr
            </a>

            <!-- Hamburger Toggle (mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll"
            aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>

        <div class="collapse navbar-collapse" id="navbarScroll">

          <!-- Navigation Buttons -->
          <ul class="navbar-nav mx-auto my-2 my-lg-0 navbar-nav-scroll  gap-5" style="--bs-scroll-height: 100px;">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#" onclick="filterItems('all')">All</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="filterItems('Book')">Books</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="filterItems('Movie')">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="filterItems('Anime')">Anime</a>
            </li>
          </ul>

          <!-- SEARCH BUTTON -->
          <form class="d-flex" id="searchForm">
            <input class="form-control me-2" type="search" placeholder="Search" id="searchInput" aria-label="Search">
            <button class="btn btn-outline-success" type="button" onclick="searchItems()">Search</button>
          </form>

        </div>
      </div>
    </nav>

      

        <div class = "container" style="max-width: 700px; padding-top: 0; margin:0 auto; ">
          <div class = "page-header">
            <h1>My Entertainment List </h1>
            <p>Track what's entertaining, and want what will entertain you next </p>
            <div class = "divder"></div>
          </div>
        </div>
          <!-- ADD ENTIRETANMENT  -->
        <div class="add-card">
          <h5> + Add New </h5>
          <div class = "container-1">
            <div class = "col-md-1">
              <label class="form-label"> Type</label>
              <select class = "form-select" id ="inputType">
                <option value>--</option>
                <option>Book</option>
                <option>Movie</option>
                <option>Anime</option>
              </select>
            </div>
            <div class = "col-md-5">
              <label class ="form-label">Title</label>
              <input type="text" class="form-control" id="inputTitle" placeholder="e.g. End game">
            </div>

            <div class = "col-md-3">
              <label class ="form-label">Genre</label>
              <select class="form-select" id="inputGenre">
                <option value>Pick Genre</option>
                <option>Fiction</option>
                <option>Non-fiction</option>
                <option>Fantasy</option>
                <option>Horror</option>
                <option>History</option>
                <option>Western</option>
                <option>Other</option>
              </select>
            </div>

            <div class = "col-md-2">
              <label class ="form-label">Rating </label>
              <select class="form-select" id="inputRating">
                <option value>1-5</option>
                <option>⭐️</option>
                <option>⭐️⭐️</option>
                <option>⭐️⭐️⭐️</option>
                <option>⭐️⭐️⭐️⭐️</option>
                <option>⭐️⭐️⭐️⭐️⭐️</option>

              </select>
            </div>

            
            <!-- ADD TO LIST BUTTON-->
            <div class = "col-md-2 d-flex align-items-end">
              <button class = "btn-add w-100" onclick="addBook()">Submit</button>
            </div>

          </div>
        </div>

            <!-- READ/WATCHED INFORMATION-->
    <div class="read-bar" id="readBar"></div>


    <!--List of items-->
    <div id = "bookList">
      <div class = "empty-state">
        <div class = "icon"> </div>
        <p>Nothing in List. Add one above</p>
      </div>
    </div>
    


  
    
    <!-- Optional JavaScript; choose one of the two! -->
    

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>  
    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    -->
  </body> 
  
</html>
